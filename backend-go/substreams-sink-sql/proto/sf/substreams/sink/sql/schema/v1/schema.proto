syntax = "proto3";
import "google/protobuf/descriptor.proto";

package schema;
option go_package = "github.com/streamingfast/substreams-sink-sql/pb/sf/substreams/sink/sql/schema/v1";

// Extension to add table metadata to protobuf messages.
// Usage: Add `option (table) = { name: "my_table" };` to a message definition
// to specify how the message should be mapped to a database table.
// Only message with the option will be converted to database table.
extend google.protobuf.MessageOptions {
  Table table = 77701;
}

// Extension to add column metadata to protobuf fields.
// Usage: Add `[(field) = { name: "custom_column_name", primary_key: true }];` 
// to a field definition to customize how the field is mapped to a database column.
extend google.protobuf.FieldOptions {
  Column field = 77702;
}

// Table defines metadata for mapping a protobuf message to a database table.
// This message is used with the (table) extension on protobuf messages.
message Table {
  // The name of the database table. If not specified, the message name is used.
  string name = 1;
  
  // Optional field to specify a parent table for establishing table relationships.
  // Used for creating foreign key relationships in relational databases.
  optional string child_of = 2;
  
  // ClickHouse-specific table options for configuring table engine parameters.
  // Only applicable when using ClickHouse as the target database.
  optional ClickhouseTableOptions clickhouse_table_options = 200;
}

// Int128 represents a 128-bit signed integer type for string conversion.
// Used in StringConvertion to specify that a string field should be converted to Int128.
message Int128 {
}

// UInt128 represents a 128-bit unsigned integer type for string conversion.
// Used in StringConvertion to specify that a string field should be converted to UInt128.
message UInt128 {
}

// Int256 represents a 256-bit signed integer type for string conversion.
// Used in StringConvertion to specify that a string field should be converted to Int256.
message Int256 {
}

// UInt256 represents a 256-bit unsigned integer type for string conversion.
// Used in StringConvertion to specify that a string field should be converted to UInt256.
message UInt256 {
}

// Decimal128 represents a 128-bit decimal type for string conversion.
// Used in StringConvertion to specify that a string field should be converted to Decimal128.
message Decimal128{
  // The number of digits after the decimal point for this decimal type.
  int32 scale = 1;
}

// Decimal256 represents a 256-bit decimal type for string conversion.
// Used in StringConvertion to specify that a string field should be converted to Decimal256.
message Decimal256{
  // The number of digits after the decimal point for this decimal type.
  int32 scale = 1;
}

// StringConvertion defines how string fields should be converted to specific numeric types.
// This is used when protobuf string fields contain numeric data that should be stored
// as native numeric types in the database for better performance and storage efficiency.
// Usage: Set this in Column.convertTo field to specify the target numeric type.
message StringConvertion {
  oneof convertion {
    // Convert string to 128-bit signed integer
    Int128 int128 = 2;
    
    // Convert string to 128-bit unsigned integer
    UInt128 uint128 = 3;
    
    // Convert string to 256-bit signed integer
    Int256 int256 = 4;
    
    // Convert string to 256-bit unsigned integer
    UInt256 uint256 = 6;

    // Convert string to 128-bit decimal with specified scale
    Decimal128 decimal128 = 50;
    
    // Convert string to 256-bit decimal with specified scale
    Decimal256 decimal256 = 51;
  }
}


// Column defines metadata for mapping a protobuf field to a database column.
// This message is used with the (field) extension on protobuf fields.
message Column {
  // Custom column name. If not specified, the field name is used.
  optional string name = 1;
  
  // Foreign key reference to another table's column in the format "table.column".
  // Used to establish referential integrity constraints in relational databases.
  optional string foreign_key = 2;
  
  // Whether this column should have a unique constraint.
  // Ensures no duplicate values exist for this column.
  bool unique = 3;
  
  // Whether this column is part of the primary key.
  // Primary key columns are automatically non-null and unique.
  bool primary_key = 4;
  
  // Specifies how to convert string fields to specific numeric types.
  // Only applies to string fields that contain numeric data.
  // Leave unset for no conversion (store as string).
  StringConvertion convertTo = 5;

  bool inline = 6;

}

// ClickhouseTableOptions defines ClickHouse-specific table configuration options.
// These options are used to configure ClickHouse table engines and optimize query performance.
message ClickhouseTableOptions {
    // Fields to use for the ORDER BY clause in ClickHouse table definition.
    // ORDER BY determines the physical ordering of data on disk for better compression and query performance.
    repeated ClickhouseOrderByField order_by_fields = 1;
    
    // Fields to use for table partitioning in ClickHouse.
    // Partitioning helps with query performance and data management by splitting data into logical parts.
    repeated ClickhousePartitionByField partition_fields = 2;
    
    // Secondary indexes to create for improved query performance on specific columns.
    // These are data skipping indexes that help ClickHouse skip irrelevant data blocks during queries.
    repeated ClickhouseIndexField index_fields = 4;
}

// ClickhousePartitionByField defines a field used for ClickHouse table partitioning.
// Partitioning splits data into separate parts based on the specified field values.
message ClickhousePartitionByField {
  // The name of the field to use for partitioning
  string name = 1;
  
  // Optional function to apply to the field value before partitioning (e.g., toYYYYMM for dates)
  Function function = 2;
}

// ClickhouseOrderByField defines a field used in the ClickHouse table ORDER BY clause.
// ORDER BY determines the physical storage order of data for optimal compression and query performance.
message ClickhouseOrderByField {
  // The name of the field to include in the ORDER BY clause
  string name = 1;
  
  // Whether to sort this field in descending order (default is ascending)
  bool descending = 2;
  
  // Optional function to apply to the field value before ordering (e.g., toDate for timestamps)
  Function function = 3;
}

// ClickhouseIndexField defines a secondary index for improved query performance.
// Secondary indexes help ClickHouse skip irrelevant data blocks during query execution.
message ClickhouseIndexField {
  // The name of the index (must be unique within the table)
  string name = 1;
  
  // The field name on which to create the index
  string field_name = 2;
  
  // The type of index to create (e.g., minmax, bloom_filter, set)
  IndexType type = 3;
  
  // The granularity parameter that controls index density (higher = less memory, lower precision)
  uint32 granularity = 4;
  
  // Optional function to apply to the field value before indexing
  Function function = 5;
}

// IndexType defines the types of secondary indexes available in ClickHouse.
// Each type has different performance characteristics and use cases.
enum IndexType {
  // MinMax index stores minimum and maximum values for each granule (fastest, least memory)
  minmax = 0;
  
  // Set index stores unique values for each granule (good for low cardinality fields)
  set = 1;
  
  // N-gram Bloom filter index for substring searches (good for text search)
  ngrambf_v1 = 2;
  
  // Token Bloom filter index for full-word searches (good for tokenized text)
  tokenbf_v1 = 3;
  
  // Bloom filter index for equality checks (good for high cardinality fields)
  bloom_filter = 4;
}

// Function defines transformation functions that can be applied to field values
// before partitioning, ordering, or indexing in ClickHouse.
enum Function {
  // No function applied (use raw field value)
  unset = 0;
  
  // Convert date/timestamp to YYYYMM format (useful for monthly partitioning)
  toYYYYMM = 1;
  
  // Convert date/timestamp to YYYYDD format (useful for daily partitioning)
  toYYYYDD = 2;
  
  // Extract year from date/timestamp (useful for yearly partitioning)
  toYear = 3;
  
  // Extract month from date/timestamp (useful for monthly grouping)
  toMonth = 4;
  
  // Convert timestamp to date (removes time component)
  toDate = 5;
  
  // Convert date to first day of the month (useful for monthly aggregations)
  toStartOfMonth = 6;
}
