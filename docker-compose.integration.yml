# Integration compose for the 6 fund-critical services hardened in this
# repo. Intended for **local / staging rehearsal**, not production.
#
#   docker compose -f docker-compose.integration.yml --env-file .env.integration up --build
#
# What's in here:
#   Infra:    MySQL 8, Redis 7
#   Node:     btc-assets-api, solagram-backend, mystery-bomb-box-backend
#   Rust:     unipass-wallet-relayer, utxoswap-farm-sequencer, huehub-token-distributor
#
# Every service reads its config exclusively from env. Copy
# `.env.integration.example` → `.env.integration` and fill it in before
# `up --build`. No secrets ship in this file.
#
# NOT production-ready:
#   - volumes are bind-mounts under ./data (no cloud backing, no TLS)
#   - MySQL uses the integration-test password from .env.integration
#   - no external reverse proxy; each service exposes a host port
#   - Sentry DSN / Prometheus scraping is optional (see observability section)
#
# Run the deployment rehearsal walkthrough in `docs/deployment-rehearsal.md`.

name: up-rebuild-integration

x-rust-build: &rust-build
  context: ./backend-rust
  dockerfile: Dockerfile.rust-service

services:
  # ── Infrastructure ────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in .env.integration}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-integration}
      MYSQL_USER: ${MYSQL_USER:-integration}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD in .env.integration}
    ports: ["3306:3306"]
    volumes:
      - ./data/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Expose-only (not mapped to host) so we don't clash with a
    # system-level redis-server already listening on 6379. All
    # compose services reach it via the `redis:6379` DNS name on the
    # internal bridge. Swap `expose` for `ports` if you want to run
    # `redis-cli` from the host.
    expose: ["6379"]
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 20

  # ── Node backends ─────────────────────────────────────────────────
  btc-assets-api:
    # btc-assets-api requires real CKB RPC + Bitcoin SPV + paymaster
    # key even to start (zod refuses to boot without them). Behind an
    # opt-in profile so the default `docker compose up` stays green
    # with the 5 other services.
    #   docker compose --profile chain up -d btc-assets-api
    profiles: ["chain"]
    build:
      context: ./backend-node/btc-assets-api
    restart: unless-stopped
    depends_on:
      redis: { condition: service_healthy }
    ports: ["3000:3000"]
    environment:
      NODE_ENV: production
      ADDRESS: 0.0.0.0
      PORT: 3000
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      # Compose evaluates :? even for services behind inactive
      # profiles, so these are `:-` to avoid breaking the default
      # rehearsal. The chain-profile service will crash at boot with
      # a clear zod error if you forgot to set them.
      CKB_RPC_URL: ${CKB_RPC_URL:-}
      BITCOIN_SPV_SERVICE_URL: ${BITCOIN_SPV_SERVICE_URL:-}
      BITCOIN_ELECTRS_API_URL: ${BITCOIN_ELECTRS_API_URL:-}
      BITCOIN_MEMPOOL_SPACE_API_URL: ${BITCOIN_MEMPOOL_SPACE_API_URL:-}
      PAYMASTER_PRIVATE_KEY: ${PAYMASTER_PRIVATE_KEY:-}
      PAYMASTER_RECEIVE_UTXO_CHECK: ${PAYMASTER_RECEIVE_UTXO_CHECK:-true}
      SENTRY_DSN_URL: ${SENTRY_DSN_BTC_ASSETS:-}

  solagram-backend:
    build:
      context: ./backend-node/solagram-backend
    restart: unless-stopped
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
    ports: ["3001:3001"]
    environment:
      # The decompiled AppConfigService does `_config.get('xxx')` with
      # **lowercase** keys, and NestJS ConfigService reads
      # process.env case-sensitive. So every key this service actually
      # uses needs a lowercase env-var here.
      port: "3001"
      globalPrefix: ""
      dbHost: mysql
      dbPort: "3306"
      dbUsername: ${MYSQL_USER:-integration}
      dbPassword: ${MYSQL_PASSWORD}
      dbDatabase: ${MYSQL_DATABASE:-integration}
      enableOrmLogs: "false"
      maxQueryExecutionTime: "1000"
      timezone: UTC
      connectionLimit: "10"
      redisIsCluster: "false"
      redisSingleUrl: redis://redis:6379
      redisPassword: ""
      redisUsername: ""
      enabledDocumentation: "false"
      NODE_ENV: production
      PORT: 3001
      SOLANA_RPC_URL: ${SOLANA_RPC_URL:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env.integration}
      KEYBLOB_ENCRYPTION_KEY: ${KEYBLOB_ENCRYPTION_KEY:?set KEYBLOB_ENCRYPTION_KEY (hex, 32 bytes)}
      SENTRY_DSN: ${SENTRY_DSN_SOLAGRAM:-}

  mystery-bomb-box-backend:
    build:
      context: ./backend-node/mystery-bomb-box-backend
    restart: unless-stopped
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
    ports: ["3002:3002"]
    environment:
      # Same lowercase-key quirk as solagram.
      port: "3002"
      globalPrefix: ""
      dbHost: mysql
      dbPort: "3306"
      dbUsername: ${MYSQL_USER:-integration}
      dbPassword: ${MYSQL_PASSWORD}
      dbDatabase: ${MYSQL_DATABASE:-integration}
      enableOrmLogs: "false"
      maxQueryExecutionTime: "1000"
      timezone: UTC
      connectionLimit: "10"
      redisIsCluster: "false"
      redisSingleUrl: redis://redis:6379
      redisPassword: ""
      redisUsername: ""
      # @solana/web3.js Connection constructor asserts the URL starts
      # with http[s]:. An empty string crashes the whole Nest boot.
      # For rehearsal we point at a placeholder that simply won't
      # resolve (TransactionService never actually broadcasts without
      # BOMB_BOX_OPERATOR_KEY anyway).
      solanaRpcUrl: ${SOLANA_RPC_URL:-https://api.devnet.solana.com}
      NODE_ENV: production
      PORT: 3002
      SOLANA_RPC_URL: ${SOLANA_RPC_URL:-https://api.devnet.solana.com}
      BOMB_BOX_OPERATOR_KEY: ${BOMB_BOX_OPERATOR_KEY:-}
      SENTRY_DSN: ${SENTRY_DSN_BOMBBOX:-}

  # ── Rust fund-critical services ───────────────────────────────────
  # All three use ./backend-rust/ as build context so the relative
  # `../huehub-observability` path resolves.
  unipass-wallet-relayer:
    build:
      <<: *rust-build
      args:
        SERVICE: unipass-wallet-relayer
    image: unipass-wallet-relayer:integration
    restart: unless-stopped
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
    ports: ["8085:8085"]
    environment:
      PORT: 8085
      DATABASE_URL: mysql://${MYSQL_USER:-integration}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE:-integration}
      REDIS_URL: redis://redis:6379
      RUST_LOG: info
      RELAYER_PRIVATE_KEY: ${RELAYER_PRIVATE_KEY:?set RELAYER_PRIVATE_KEY in .env.integration}
      RELAYER_API_KEY: ${RELAYER_API_KEY:?set RELAYER_API_KEY in .env.integration}
      CORS_ALLOWED_ORIGINS: ${RELAYER_CORS_ORIGINS:-}

  utxoswap-farm-sequencer:
    build:
      <<: *rust-build
      args:
        SERVICE: utxoswap-farm-sequencer
    image: utxoswap-farm-sequencer:integration
    restart: unless-stopped
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
    ports: ["8086:8086"]
    environment:
      PORT: 8086
      DATABASE_URL: mysql://${MYSQL_USER:-integration}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE:-integration}
      REDIS_URL: redis://redis:6379
      RUST_LOG: info
      FARM_API_KEY: ${FARM_API_KEY:?set FARM_API_KEY in .env.integration}
      FARM_ADMIN_ADDRESSES: ${FARM_ADMIN_ADDRESSES:-}
      FARM_ADMIN_PUBKEYS: ${FARM_ADMIN_PUBKEYS:-}
      # HIGH-FM-3: leave unset for rehearsal. Setting it to 1 would
      # open the `/intents/submit` endpoint, but the background solver
      # loop is still a debug-log placeholder — any intent accepted
      # would sit Pending forever. Only flip once the real CKB batch-tx
      # builder is wired in.
      FARM_PROCESSING_ENABLED: ${FARM_PROCESSING_ENABLED:-}
      # CKB RPC is optional for pure process-startup rehearsal; the
      # service parses these fields with envy at boot and will refuse
      # to start if they are missing, so we provide a placeholder.
      CKB_RPC_URL: ${CKB_RPC_URL:-http://placeholder-ckb-rpc:8114}
      CKB_INDEXER_URL: ${CKB_INDEXER_URL:-http://placeholder-ckb-indexer:8116}
      SEQUENCER_API_URL: ${SEQUENCER_API_URL:-}
      SLACK_WEBHOOK: ${SLACK_WEBHOOK:-}
      CORS_ALLOWED_ORIGINS: ${FARM_CORS_ORIGINS:-}

  huehub-token-distributor:
    build:
      <<: *rust-build
      args:
        SERVICE: huehub-token-distributor
    image: huehub-token-distributor:integration
    restart: unless-stopped
    depends_on:
      mysql: { condition: service_healthy }
    ports: ["8087:8087"]
    environment:
      PORT: 8087
      DATABASE_URL: mysql://${MYSQL_USER:-integration}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE:-integration}
      RUST_LOG: info
      # Distributor is fail-closed: ENABLE_CKB_SUBMISSION stays `false` for
      # integration rehearsal so txs never reach a real CKB node. Flip to
      # `true` only against a devnet once CKB_* env vars are filled in.
      ENABLE_CKB_SUBMISSION: ${ENABLE_CKB_SUBMISSION:-false}
      CKB_RPC_URL: ${CKB_RPC_URL:-}
      CKB_DISTRIBUTOR_ADDRESS: ${CKB_DISTRIBUTOR_ADDRESS:-}
      DISTRIBUTOR_PRIVATE_KEY: ${DISTRIBUTOR_PRIVATE_KEY:-}
      DISTRIBUTOR_API_KEY: ${DISTRIBUTOR_API_KEY:?set DISTRIBUTOR_API_KEY in .env.integration}
      CORS_ALLOWED_ORIGINS: ${DISTRIBUTOR_CORS_ORIGINS:-}

# ── Port map ──────────────────────────────────────────────────────
#   3000  btc-assets-api           /health
#   3001  solagram-backend         /health
#   3002  mystery-bomb-box-backend /health
#   3306  mysql
#   ----  redis (compose-internal only; not mapped to host)
#   8085  unipass-wallet-relayer   /health  /healthz  /readyz  /metrics
#   8086  utxoswap-farm-sequencer  /health  /healthz  /readyz  /metrics
#   8087  huehub-token-distributor /health
