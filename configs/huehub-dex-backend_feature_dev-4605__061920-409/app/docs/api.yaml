info:
  title: Hue Hub Dex API
  description: Hue Hub Dex API description
  version: '1.0'
  contact: {}
tags: []
servers: []
components:
  schemas:
    GetNonceOutput:
      type: object
      properties:
        nonce:
          type: string
          description: The nonce string that requires a signature
        message:
          type: string
          description: Message string that requires signature
      required:
        - nonce
        - message
    "SwaggerBaseApiResponseFor class GetNonceOutput {\n} ":
      type: object
      properties:
        code:
          type: number
          description: >-
            200:success;4000:parameter exception 4001:Item invalid;4002:Service
            fee not match;4003:Psbt not match;4004:Ckb tx not
            match;4005:Signature error,4006:Item is existing
        message:
          type: string
        data:
          $ref: '#/components/schemas/GetNonceOutput'
      required:
        - code
        - message
        - data
    UserLoginInput:
      type: object
      properties:
        address:
          type: string
          description: get nonce for btc address verification
        publicKey:
          type: string
          description: btc public key
        signature:
          type: string
          description: btc address signature
        nonce:
          type: string
          description: btc address nonce
      required:
        - address
        - publicKey
        - signature
        - nonce
    UserLoginOutput:
      type: object
      properties:
        isVerified:
          type: boolean
          description: The btc signature verification status
        accessToken:
          type: string
          description: Access Token after signature verification passed
      required:
        - isVerified
    "SwaggerBaseApiResponseFor class UserLoginOutput {\n} ":
      type: object
      properties:
        code:
          type: number
          description: >-
            200:success;4000:parameter exception 4001:Item invalid;4002:Service
            fee not match;4003:Psbt not match;4004:Ckb tx not
            match;4005:Signature error,4006:Item is existing
        message:
          type: string
        data:
          $ref: '#/components/schemas/UserLoginOutput'
      required:
        - code
        - message
        - data
    AssetsInputDto:
      type: object
      properties:
        tokenId:
          type: number
          description: token id
        xudtTypeHash:
          type: string
          description: xudt token type hash
        fullUTXO:
          type: boolean
          description: Indicates whether to return detailed utxo information
    TokenInfo:
      type: object
      properties:
        id:
          type: number
          description: token id
        iconUrl:
          type: string
          description: token url
        name:
          type: string
          description: token name
        symbol:
          type: string
          description: token symbol
        pricePerToken:
          type: string
          description: The btc price of selling a single rgb++ token in Satoshi / token
        usdPricePerToken:
          type: string
          description: The btc price of selling a single rgb++ token in USD
        amount:
          type: string
          description: rgb++ token amount
        tokenDecimal:
          type: number
          description: sell rgb++ token decimal
        utxoCount:
          type: number
          description: rgb++ token utxo count
        xudtCodeHash:
          type: string
          description: rgbpp type code hash
        xudtArgs:
          type: string
          description: rgbpp type args
        xudtTypeHash:
          type: string
          description: xudt token type hash
