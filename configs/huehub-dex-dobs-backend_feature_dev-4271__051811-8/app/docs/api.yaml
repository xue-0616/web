info:
  title: Hue Hub Dex API
  description: Hue Hub Dex API description
  version: '1.0'
  contact: {}
tags: []
servers: []
components:
  schemas:
    AssetsInputDto:
      type: object
      properties:
        clusterTypeHash:
          type: string
          description: collection type hash
        fullUTXO:
          type: boolean
          description: Indicates whether to return detailed utxo information
    CollectionInfo:
      type: object
      properties:
        id:
          type: number
          description: collection id
        iconUrl:
          type: string
          description: collection url
        name:
          type: string
          description: collection name
        description:
          type: string
          description: collection description
        price:
          type: string
          description: The btc price, unit Satoshi / nft
        usdPrice:
          type: string
          description: The btc price in USD
        amount:
          type: number
          description: dobs nft amount
        decimal:
          type: number
          description: dobs nft decimal
        utxoCount:
          type: number
          description: dobs collect utxo count
        clusterArgs:
          type: string
          description: cluster type args
        clusterTypeHash:
          type: string
          description: cluster type hash
      required:
        - id
        - iconUrl
        - name
        - description
        - price
        - usdPrice
        - amount
        - decimal
        - utxoCount
        - clusterArgs
    UTXOInfo:
      type: object
      properties:
        txHash:
          type: string
          description: utxo tx hash
        index:
          type: number
          description: utxo index
        value:
          type: string
          description: btc value
        status:
          type: number
          enum:
            - 0
            - 1
            - 2
            - 3
          description: 0:ListUtxo 1:ListPendingUtox,2:LiveBtcUtxo,3:FreezeBtcUtxo
        sporeTypeHash:
          type: number
          description: utxo bind spore type hash
        sporeArgs:
          type: number
          description: utxo bind spore args
        itemId:
          type: number
          description: utxo bind item id
        name:
          type: string
          description: dobs collections name
        prevBg:
          type: string
          description: spore prevBg base64  data
        prevBgColor:
          type: string
          description: spore prev.bgcolor
        prevType:
          type: string
          description: spore prev.type
        dobId:
          type: string
          description: spore dobId
      required:
        - txHash
        - index
        - value
        - status
        - sporeTypeHash
        - sporeArgs
    AssetInfo:
      type: object
      properties:
        collectionInfo:
          description: ' Dobs collection info'
          allOf:
            - $ref: '#/components/schemas/CollectionInfo'
        utxos:
          description: >-
            When fullUTXO is true, return detailed information. If false, return
            empty
          type: array
          items:
            $ref: '#/components/schemas/UTXOInfo'
      required:
        - collectionInfo
        - utxos
    AssetsOutputDto:
      type: object
      properties:
        collections:
          description: nft asset list
          type: array
          items:
            $ref: '#/components/schemas/AssetInfo'
        balance:
          type: string
          description: btc balance
        availableBalance:
          type: string
          description: available btc balance
        frozenBalance:
          type: string
          description: frozen btc balance
      required:
        - collections
        - balance
        - availableBalance
        - frozenBalance
    "SwaggerBaseApiResponseFor class AssetsOutputDto {\n} ":
      type: object
      properties:
        code:
          type: number
          description: >-
            200:success;4000:parameter exception 4001:Item invalid;4002:Service
            fee not match;4003:Psbt not match;4004:Ckb tx not
            match;4005:Signature error,4006:Item is existing
        message:
          type: string
        data:
          $ref: '#/components/schemas/AssetsOutputDto'
      required:
        - code
        - message
        - data
    CollectionInfoDto:
      type: object
      properties:
        id:
          type: number
          description: collection id
        iconUrl:
          type: string
          description: collection url
        name:
          type: string
          description: collection name
        clusterTypeHash:
          type: string
          description: collection type hash
        clusterTypeArgs:
          type: number
          enum: []
          description: collection args
        supply:
          type: string
          description: dobs total supply
        price:
          type: string
          description: The btc price, unit Satoshi / nft
        usdPrice:
          type: string
          description: The btc price in USD
        change:
          type: string
          description: dobs usd price
        volume:
          type: string
          description: dobs volume in Satoshi
        usdVolume:
          type: string
          description: dobs usd volume
        marketCap:
          type: string
          description: dobs market cap in Satoshi
        usdMarketCap:
          type: string
          description: dobs usd market cap
        holders:
          type: string
          description: dobs holders number
        holdersChange:
          type: string
          description: dobs holders changer
        sales:
          type: string
          description: dobs sales changer
        decimal:
          type: number
          description: dobs nft decimal
      required:
        - id
        - iconUrl
        - name
        - clusterTypeHash
        - clusterTypeArgs
        - supply
        - decimal
    CollectionOutputDto:
      type: object
      properties:
        list:
          description: dobs sales changer
          type: array
          items:
            $ref: '#/components/schemas/CollectionInfoDto'
      required:
        - list
    "SwaggerBaseApiResponseFor class CollectionOutputDto {\n} ":
      type: object
