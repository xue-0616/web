name: rust-tests

# Gates PRs on the Rust security-middleware crate's integration tests
# (7 tests in tests/middleware.rs covering request-id minting, audit
# sink behaviour, and rate-limit burst enforcement). This crate is the
# shared foundation that all huehub / unipass actix-web services are
# supposed to wrap; a silent regression here would break the whole
# fleet's observability and DoS protection.
#
# We deliberately scope this workflow to the middleware crate only —
# the wider backend-rust/ tree contains ~20 services, many decompiled
# or half-reconstructed, and running `cargo test` over all of them
# would both blow the CI budget and produce noise on unrelated
# breakage. New services opt in by adding their own job below.

on:
  pull_request:
    paths:
      - 'backend-rust/huehub-security-middleware/**'
      - 'backend-rust/huehub-observability/**'
      - 'backend-rust/unipass-wallet-relayer/**'
      - 'backend-rust/utxoswap-farm-sequencer/**'
      - 'backend-rust/utxo-swap-sequencer/**'
      - 'backend-rust/huehub-token-distributor/src/security.rs'
      - 'backend-rust/huehub-token-distributor/crates/distributor-types/src/lib.rs'
      - '.github/workflows/rust-tests.yml'
  push:
    branches: [main]
    paths:
      - 'backend-rust/huehub-security-middleware/**'
      - 'backend-rust/huehub-observability/**'
      - 'backend-rust/unipass-wallet-relayer/**'
      - 'backend-rust/utxoswap-farm-sequencer/**'
      - 'backend-rust/utxo-swap-sequencer/**'
      - 'backend-rust/huehub-token-distributor/src/security.rs'
      - 'backend-rust/huehub-token-distributor/crates/distributor-types/src/lib.rs'
      - '.github/workflows/rust-tests.yml'

jobs:
  huehub-security-middleware:
    name: huehub-security-middleware (cargo test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-rust/huehub-security-middleware
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          # The crate pins edition 2021; stable is sufficient. No nightly
          # features are used so we do NOT opt into beta/nightly here —
          # keeping the toolchain stable means a surprise nightly
          # regression can't break the gate.
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend-rust/huehub-security-middleware
      # fmt deliberately not gated — existing sources predate the
      # current rustfmt style and reformatting would churn every file
      # in this PR. Add a separate `rust-fmt.yml` once the crate is
      # reformatted in a single dedicated commit.
      - name: clippy
        # -D warnings so any new lint fails the build. The crate is
        # small enough that clippy noise is manageable; if this becomes
        # too restrictive in future, narrow to `-D clippy::correctness`.
        run: cargo clippy --all-targets -- -D warnings
      - name: test
        # The integration suite under tests/middleware.rs pulls
        # actix-governor's time source; --test-threads=1 avoids
        # flake on shared global state across tests.
        run: cargo test --all-targets -- --test-threads=1

  huehub-observability:
    # Gates the shared observability crate (logs / metrics / health /
    # errors). The integration suite under tests/smoke.rs covers:
    #   - /healthz returns 200 JSON
    #   - /readyz returns 200 when all deps healthy
    #   - /readyz returns 503 when any dep fails
    #   - /metrics renders Prometheus exposition format
    # Same rationale as huehub-security-middleware: one dependency
    # used by every fund-critical Rust service, so a regression here
    # is a fleet-wide regression.
    name: huehub-observability (cargo clippy + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-rust/huehub-observability
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend-rust/huehub-observability
      - name: clippy
        # Clippy with -D warnings catches the unexpected_cfgs regression
        # class that slipped into this crate's original src/errors.rs
        # (feature = "__never_set"). Keeping the gate on prevents
        # future reverts.
        run: cargo clippy --all-targets -- -D warnings
      - name: test
        # --test-threads=1 because the metrics recorder installs a
        # process-global singleton; parallel tests would race to
        # install it and one would get "recorder already installed".
        run: cargo test --all-targets -- --test-threads=1

  unipass-wallet-relayer-security:
    # Gates only the pure-function unit tests in src/security.rs
    # (constant_time_eq + SecurePrivateKey hex parsing / redaction).
    # We deliberately do NOT run the full workspace cargo test because
    # the relayer has decompiled / stubbed handler crates that don't
    # even compile cleanly; that bigger remediation is tracked in
    # backend-rust/SECURITY_AUDIT_3_PROJECTS.md and will get its own
    # job when those stubs are filled in.
    name: unipass-wallet-relayer src/security.rs (cargo test security::tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-rust/unipass-wallet-relayer
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend-rust/unipass-wallet-relayer
      - name: test security module
        # Targeting the named test path keeps CI focused on the
        # 12 pure-function tests added in the BUG-P2 hardening pass
        # and avoids pulling decompiled sibling crates into the
        # gating path.
        run: cargo test --bin unipass-wallet-relayer security::tests
      - name: test execute-validator (BUG-P2-C2 / HIGH-RL-2 / HIGH-RL-3)
        # 9 validator tests (inner-tx cap, delegate_call reject, gas
        # limit, cumulative-value overflow) + 5 parser tests
        # (malformed selector, data_len overflow, nonce/sig round-trip).
        # Regression for the fix that replaced the tautological
        # ecrecover check with real structural validation.
        run: cargo test -p execute-validator --lib
      - name: test relayer lib (BUG-P2-C2 pipeline + RPC client)
        # 16 tests total:
        #   - api::transactions (6) — handler-level, mocked simulator
        #     covering happy path, replay, simulator revert, bad
        #     selector, empty calldata, delegate_call early-reject
        #   - replay (5) — Redis-backed nonce cache semantics
        #   - api::rpc_client (5) — HIGH-RL-1 chain-id -> URL mapping
        # Runs without external services (all tests use in-memory
        # fakes); no Redis / RPC sidecar needed in CI.
        run: cargo test -p relayer --lib

  utxo-swap-sequencer-molecule:
    # Gates the CRIT-SW-1 / CRIT-SW-2 regression tests added in the
    # deep-audit remediation pass. The bug itself (reading molecule
    # total_size as `version`, walking RawTransaction from the wrong
    # base offset) was already fixed in source; these tests exist so
    # nobody reintroduces it. 5 tests in crates/api/src/intents/
    # swap_exact_input_for_output.rs::tests.
    #
    # We test just the api crate (cargo test -p api --lib intents::)
    # because the rest of the swap-seq workspace still has some
    # decompiled siblings (accounts/*, chains/*) whose compile status
    # is tracked separately.
    name: utxo-swap-sequencer (molecule parser regression)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-rust/utxo-swap-sequencer
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend-rust/utxo-swap-sequencer
      - name: test molecule parser regression
        run: cargo test -p api --lib intents::swap_exact_input_for_output::tests

  utxoswap-farm-sequencer-purefuncs:
    # Gates the two pure-function test suites added in the BUG-P1
    # hardening pass:
    #   - src/security.rs -> constant_time_eq (4 tests)
    #   - crates/types/src/parser.rs -> parse_farm_intent + helpers
    #     (9 tests, including the BUG-P1-M1 unwrap-removal regression
    #     coverage for attacker-controlled cell data)
    # We test crates/types separately (cargo test -p types) because
    # it's a leaf crate with no network / redis dependencies and
    # compiles fast; running it in isolation keeps the gate quick and
    # surfaces parser regressions without dragging the whole workspace
    # into the gating path (some sibling crates still have decompiled
    # stubs per BUG-P1-H2).
    name: utxoswap-farm-sequencer (parser + security::tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-rust/utxoswap-farm-sequencer
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend-rust/utxoswap-farm-sequencer
      - name: test parser (crates/types)
        run: cargo test -p types parser::tests
      - name: test security module (bin)
        run: cargo test --bin utxoswap-farm-sequencer security::tests
      - name: test intent submission (HIGH-FM-1 / HIGH-FM-2 / HIGH-FM-3)
        # 2 tests gating the intent_type/amount write-through fix
        # and the Decimal conversion path for the fail-closed gate
        # (HIGH-FM-3). Also transitively exercises the ApiError
        # ServiceUnavailable (503) mapping added in this pass.
        run: cargo test -p api --lib intents::submit::tests

  huehub-token-distributor-purefuncs:
    # Gates the pure-function test suites added in the BUG-P3
    # hardening pass:
    #   - src/security.rs -> constant_time_eq + SecurePrivateKey (12 tests)
    #   - crates/distributor-types/src/lib.rs ->
    #       parse_token_amount / checked_sub_amount / validate_ckb_address
    #       / DistributorTxStatus round-trip (17 tests)
    # These three validators back every hot-path call in
    # process_single_distribution / process_single_mint /
    # mark_tx_failed — a regression in any of them leaks money or
    # DoS-es the queue, so they deserve their own CI check.
    # Same scope rationale as the other per-service jobs: we target
    # the named test paths instead of --all-targets because the
    # distributor's ckb_tx module and backend-daos crate still have
    # stub-adjacent code that's not worth gating yet.
    name: huehub-token-distributor (distributor-types + security::tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-rust/huehub-token-distributor
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend-rust/huehub-token-distributor
      - name: test distributor-types (pure validators)
        run: cargo test -p distributor-types
      - name: test security module (bin)
        run: cargo test --bin huehub-token-distributor security::tests
