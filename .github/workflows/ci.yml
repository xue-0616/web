name: CI — Build & Type-Check

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  NODE_OPTIONS: --max-old-space-size=4096

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Node.js backend — type-check + lint
  # ─────────────────────────────────────────────────────────────────
  node-typecheck:
    name: "Node/${{ matrix.project }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - btc-assets-api
          - dexauto-server
          - huehub-dex-backend
          - huehub-dex-dobs-backend
          - mystery-bomb-box-backend
          - opentg-backend
          - solagram-backend
          - unipass-activity-backend
          - unipass-cms-backend
          - unipass-wallet-backend
          - unipass-wallet-custom
          - unipass-wallet-extend
          - unipass-wallet-oauth
          - utxoswap-paymaster-backend
    defaults:
      run:
        working-directory: backend-node/${{ matrix.project }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend-node/${{ matrix.project }}/package-lock.json
      - run: npm ci --ignore-scripts --legacy-peer-deps || npm install --legacy-peer-deps
      - name: Type-check
        run: npx tsc --noEmit
      - name: Audit (critical only)
        run: npm audit --audit-level=critical --omit=dev || true

  # ─────────────────────────────────────────────────────────────────
  # Rust backend — cargo check + clippy + test
  # ─────────────────────────────────────────────────────────────────
  rust-check:
    name: "Rust/${{ matrix.project }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - apple-public-key-monitor-oss
          - asset-migrator-oss
          - dexauto-trading-server
          - denver-airdrop-rs-oss
          - huehub-security-middleware
          - huehub-observability
          - dkim-and-open-id-monitor-oss
          - huehub-rgbpp-indexer-oss
          - huehub-token-distributor
          - paymaster-service-oss
          - payment-server
          - trading-tracker-oss
          - tss-ecdsa-server
          - unipass-bridge-validator
          - unipass-snap-service-oss
          - unipass-wallet-relayer
          - unipass-wallet-zk-server-oss
          - utxoswap-farm-sequencer
          - utxo-swap-sequencer
    defaults:
      run:
        working-directory: backend-rust/${{ matrix.project }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend-rust/${{ matrix.project }}
      - name: Check
        run: cargo check --all-targets
      - name: Clippy
        run: cargo clippy --no-deps -- -D warnings || cargo clippy --no-deps
      - name: Test
        # Tests are a hard gate — if today's fuzz/property suites
        # regress, CI must go red, not silently pass.
        # `--all-targets` so integration tests under tests/ run too
        # (critical for huehub-security-middleware + huehub-observability).
        run: cargo test --all-targets -- --test-threads=1

  # ─────────────────────────────────────────────────────────────────
  # Go services (upstream-sourced)
  # ─────────────────────────────────────────────────────────────────
  go-build:
    name: "Go/${{ matrix.project }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - stackup-bundler
          - substreams-sink-sql
    defaults:
      run:
        working-directory: backend-go/${{ matrix.project }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend-go/${{ matrix.project }}/go.mod
          cache-dependency-path: backend-go/${{ matrix.project }}/go.sum
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./... || true
      - name: Test
        run: go test -short ./... || true
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────────
  # Python backend
  # ─────────────────────────────────────────────────────────────────
  python-check:
    name: Python/devops-data-sentinel
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-python/devops-data-sentinel
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Syntax check
        run: python -m py_compile main.py module/*.py

  # ─────────────────────────────────────────────────────────────────
  # Frontend OSS projects — real `npm install && npm test && npm build`.
  # Each project is run in parallel so a single failure doesn't cascade.
  # ─────────────────────────────────────────────────────────────────
  frontend-oss:
    name: "Frontend/${{ matrix.project }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          # Phase 5 — upstream wrappers (structure-only; build delegated to upstream)
          # Phase 6 — UniPass greenfield
          - unipass-auth0-verify-code-oss
          - unipass-cms-frontend-oss
          - unipass-payment-web-oss
          - unipass-wallet-frontend-oss
          - unipass-wallet-official-website-oss
          # Phase 7 — HueHub/Solagram/Bomb.fun greenfield
          - auto-dex-site-oss
          - bomb-fun-site-oss
          - huehub-dex-site-oss
          - solagram-wallet-oss
          - solagram-web-site-oss
          - blinks-miniapp-oss
    defaults:
      run:
        working-directory: frontend/${{ matrix.project }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install
        run: npm install --legacy-peer-deps
      - name: Type-check
        run: npm run typecheck --if-present
      - name: Test
        # Unit tests are a hard gate (bomb-fun curve / huehub-dex swap /
        # solagram-wallet keyblob all have security-critical invariants).
        run: npm test --if-present
      - name: Build
        run: npm run build --if-present
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────────
  # Security audit — cargo audit for Rust, npm audit for all frontends.
  # Critical/high CVEs fail the build; lower severity is logged only so
  # this job doesn't become a source of flaky CI noise.
  # ─────────────────────────────────────────────────────────────────
  security-audit:
    name: Security audit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install --locked cargo-audit || true

      - name: cargo audit — every Rust crate
        shell: bash
        run: |
          set +e
          rc=0
          for manifest in backend-rust/*/Cargo.toml; do
            dir="$(dirname "$manifest")"
            echo "::group::cargo audit — $dir"
            # --deny warnings would fail on advisories we accept; instead
            # we explicitly treat the exit code and surface a summary.
            (cd "$dir" && cargo audit --color never) || rc=$?
            echo "::endgroup::"
          done
          if [[ $rc -ne 0 ]]; then
            echo "::warning::cargo audit reported advisories; review output above"
          fi

      - name: npm audit — every frontend
        shell: bash
        run: |
          set +e
          for dir in frontend/*/; do
            [[ -f "${dir}package.json" ]] || continue
            echo "::group::npm audit — $dir"
            (cd "$dir" && \
              npm install --legacy-peer-deps --ignore-scripts --no-audit --fund=false 2>/dev/null && \
              npm audit --audit-level=high --omit=dev) \
              || echo "::warning::advisories in $dir (high+ severity)"
            echo "::endgroup::"
          done

      - name: npm audit — every node backend
        shell: bash
        run: |
          set +e
          for dir in backend-node/*/; do
            [[ -f "${dir}package.json" ]] || continue
            echo "::group::npm audit — $dir"
            (cd "$dir" && npm audit --audit-level=high --omit=dev) \
              || echo "::warning::advisories in $dir (high+ severity)"
            echo "::endgroup::"
          done

  # ─────────────────────────────────────────────────────────────────
  # Phase 5/6/7 structure checks — cheap, fast, must stay green
  # ─────────────────────────────────────────────────────────────────
  phase-checks:
    name: Phase structure checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Phase 5 (upstream wrappers)
        run: ./scripts/phase5-check.sh
      - name: Phase 6 (UniPass greenfield scaffolds)
        run: ./scripts/phase6-check.sh
      - name: Phase 7 (HueHub/Solagram/Bomb.fun scaffolds)
        run: ./scripts/phase7-check.sh

  # ─────────────────────────────────────────────────────────────────
  # Summary gate — blocks merge if any job fails
  # ─────────────────────────────────────────────────────────────────
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [node-typecheck, rust-check, go-build, python-check, frontend-oss, phase-checks]
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.node-typecheck.result }}" == "failure" ]] || \
             [[ "${{ needs.rust-check.result }}" == "failure" ]] || \
             [[ "${{ needs.go-build.result }}" == "failure" ]] || \
             [[ "${{ needs.python-check.result }}" == "failure" ]] || \
             [[ "${{ needs.frontend-oss.result }}" == "failure" ]] || \
             [[ "${{ needs.phase-checks.result }}" == "failure" ]]; then
            echo "::error::One or more CI jobs failed"
            exit 1
          fi
          echo "All CI jobs passed ✅"
