# Promtail DaemonSet + ConfigMap for log shipping to Loki.
#
# Services already log JSON to stdout via tracing-subscriber's
# json fmt layer, so there's no parsing to do — just enrich with
# Kubernetes metadata and ship.
#
# Loki endpoint is assumed to be `http://loki-gateway.monitoring
# .svc.cluster.local`; adjust per your Loki install.
#
# Labels we deliberately set (for grep-ability from Grafana's
# Explore view):
#   * namespace
#   * pod / container
#   * app           (from the Deployment label)
#   * chain_id      (emitted in tracing fields for meta-tx flows)
#   * service       (same as `app`, kept for cross-stack JOIN with
#                   Prometheus `job` label)
#   * severity      (parsed from the `level` JSON field)
#
# Labels we deliberately DO NOT set:
#   * request_id / trace_id — high-cardinality, blows up the
#     index.  Keep them in the log body; query via `| json | line_format`.

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: monitoring
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0

    positions:
      filename: /run/promtail/positions.yaml

    clients:
      - url: http://loki-gateway.monitoring.svc.cluster.local/loki/api/v1/push

    scrape_configs:
      - job_name: huehub-backend-pods
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          # Only scrape pods in the huehub-backend namespace.
          - source_labels: [__meta_kubernetes_namespace]
            action: keep
            regex: huehub-backend
          # Keep only containers from our services.
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: app
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: service
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_pod_container_name]
            target_label: container
          # Path the container's log file lives at.
          - source_labels: [__meta_kubernetes_pod_uid, __meta_kubernetes_pod_container_name]
            target_label: __path__
            separator: /
            replacement: /var/log/pods/*$1/*.log

        pipeline_stages:
          # Parse the JSON line the app emits.
          - json:
              expressions:
                level: level
                chain_id: chain_id
                farm_type_hash: farm_type_hash
                stream_id: stream_id
          # Promote level → severity as a Loki label.
          - labels:
              severity: level
              chain_id:
          # Drop the noisiest debug lines at the Promtail layer
          # to save Loki ingest cost; operators can still see
          # them via the raw container log if needed.
          - drop:
              source: level
              expression: "debug"
              older_than: 24h

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: monitoring
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
    spec:
      serviceAccountName: promtail
      containers:
        - name: promtail
          image: grafana/promtail:2.9.0
          args:
            - -config.file=/etc/promtail/promtail.yaml
          volumeMounts:
            - name: config
              mountPath: /etc/promtail
            - name: positions
              mountPath: /run/promtail
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: promtail-config
        - name: positions
          hostPath: {path: /var/run/promtail}
        - name: varlog
          hostPath: {path: /var/log}
        - name: varlibdockercontainers
          hostPath: {path: /var/lib/docker/containers}
