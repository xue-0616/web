apiVersion: v1
kind: Namespace
metadata:
  name: huehub-backend
  labels:
    # Pod Security Admission (restricted profile).  Denies
    # privileged pods, hostPath, hostNetwork, etc.  Every
    # manifest in this directory is compatible.
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
