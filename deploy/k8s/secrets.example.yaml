# Secret SCHEMA (not real values!).
#
# DO NOT commit a populated version of this file.  Use one of:
#   * kubectl create secret --from-literal=... (imperative)
#   * SealedSecrets (declarative, encrypted-at-rest in git)
#   * External Secrets Operator + Vault / AWS Secrets Manager
#   * Argo CD + Vault Agent Injector
#
# This file documents the exact keys each Secret must provide,
# so a drift between the Deployment's `envFrom.secretRef` and
# the actual Secret is caught at apply time rather than at
# runtime when the service panics on a missing env var.

---
apiVersion: v1
kind: Secret
metadata:
  name: farm-sequencer-secrets
  namespace: huehub-backend
type: Opaque
stringData:
  # MySQL connection string.  Format: mysql://USER:PASS@HOST/DB
  DATABASE_URL: "REPLACE_ME"
  # Redis connection string.  Format: redis://[:PASS@]HOST:6379/DB
  REDIS_URL: "REPLACE_ME"
  # HMAC secret for the admin JWT.  Generate with:
  #   openssl rand -hex 32
  JWT_SECRET: "REPLACE_ME"
  # Comma-separated CKB addresses allowed to call admin endpoints
  # (including create_pool).  Empty string → admin routes reject
  # everyone (fail-closed).
  FARM_ADMIN_ADDRESSES: ""
  # Parallel to FARM_ADMIN_ADDRESSES: the secp256k1 pubkeys in
  # hex, same order.  Required for signature-verified admin flows.
  FARM_ADMIN_PUBKEYS: ""

---
apiVersion: v1
kind: Secret
metadata:
  name: relayer-secrets
  namespace: huehub-backend
type: Opaque
stringData:
  DATABASE_URL: "REPLACE_ME"
  REDIS_URL: "REPLACE_ME"
  JWT_SECRET: "REPLACE_ME"
  # 32-byte hex.  Used by src/security.rs::SecurePrivateKey to
  # wrap anything we store encrypted-at-rest in the DB
  # (currently unused but required at boot; generate it now so
  # a rollout of the MED-RL-3 real broadcaster doesn't have to
  # schedule a downtime to add it).
  KEYBLOB_ENCRYPTION_KEY: "REPLACE_ME"
  # The relayer's own EOA private key (0x-prefixed hex).
  # Signs every outgoing meta-tx via eth_sendRawTransaction.
  # MUST come from a hardware module (HSM, Fireblocks, MPC)
  # in production — the stringData here is strictly for dev
  # rehearsal.  Redacted in Debug impl at runtime.
  RELAYER_PRIVATE_KEY: "0xREPLACE_ME"
