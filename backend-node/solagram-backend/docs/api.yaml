      required:
        - code
        - message
        - data
    TxRawDataInputDto:
      type: object
      properties:
        method:
          type: string
        nonce:
          type: string
        data:
          type: string
      required:
        - method
        - nonce
    ShowTokenInfoInputDto:
      type: object
      properties:
        addresses:
          description: token address
          type: array
          items:
            type: string
      required:
        - addresses
    TokenInfoOutput:
      type: object
      properties: {}
    "SwaggerBaseApiResponseFor class TokenInfoOutput {\n} ":
      type: object
      properties:
        code:
          type: number
          description: |-
            200:success;
             4000:parameter exception,
             4001: auth hash error 
             4002: message not find.
             
        message:
          type: string
        data:
          $ref: '#/components/schemas/TokenInfoOutput'
      required:
        - code
        - message
        - data
    TransfersData:
      type: object
      properties:
        instructionIndex:
          type: number
        innerInstructionIndex:
          type: number
        action:
          type: string
        status:
          type: string
        source:
          type: string
        sourceAssociation:
          type: string
        destination:
          type: string
        destinationAssociation:
          type: string
        token:
          type: string
        amount:
          type: number
        timestamp:
          type: number
      required:
        - instructionIndex
        - innerInstructionIndex
        - action
        - status
        - source
        - token
        - amount
        - timestamp
    TransfersInfo:
      type: object
      properties:
        transactionHash:
          type: string
        data:
          type: array
          items:
            $ref: '#/components/schemas/TransfersData'
      required:
        - transactionHash
        - data
    Pagination:
      type: object
      properties:
        currentPage:
          type: number
        totalPages:
          type: number
      required:
