info:
  title: Solagram API
  description: Solagram API description
  version: '1.0'
  contact: {}
tags: []
servers: []
components:
  schemas:
    BlinkShortCodeOutputDto:
      type: object
      properties:
        url:
          type: string
          description: blink url
      required:
        - url
    "SwaggerBaseApiResponseFor class BlinkShortCodeOutputDto {\n} ":
      type: object
      properties:
        code:
          type: number
          description: |-
            200:success;
             4000:parameter exception,
             4001: auth hash error 
             4002: message not find.
             
        message:
          type: string
        data:
          $ref: '#/components/schemas/BlinkShortCodeOutputDto'
      required:
        - code
        - message
        - data
    BlinkInfo:
      type: object
      properties:
        blink:
          type: string
          description: blink list
        id:
          type: number
      required:
        - blink
    QueryShortCodeInput:
      type: object
      properties:
        blinks:
          description: blink list
          type: array
          items:
            $ref: '#/components/schemas/BlinkInfo'
        domain:
          type: string
      required:
        - blinks
        - domain
    QueryShortCodeOutput:
      type: object
      properties:
        blink:
          type: string
        shortCode:
          type: string
        id:
          type: number
      required:
        - blink
        - shortCode
    "SwaggerBaseApiResponseFor class QueryShortCodeOutput {\n} ":
      type: object
      properties:
        code:
          type: number
          description: |-
            200:success;
             4000:parameter exception,
             4001: auth hash error 
             4002: message not find.
             
        message:
          type: string
        data:
          description: null
          type: array
          items:
            $ref: '#/components/schemas/QueryShortCodeOutput'
      required:
        - code
        - message
        - data
    UserInfo:
      type: object
      properties:
        id:
          type: number
        first_name:
          type: string
        last_name:
          type: string
        username:
          type: string
        language_code:
          type: string
        added_to_attachment_menu:
          type: boolean
        allows_write_to_pm:
          type: boolean
        photo_url:
          type: string
      required:
        - id
        - first_name
        - last_name
        - username
        - language_code
    LoginInputDto:
      type: object
      properties:
        user:
          description: WebApp.initDataUnsafe.user
          allOf:
            - $ref: '#/components/schemas/UserInfo'
        auth_date:
          type: string
          description: WebApp.initDataUnsafe.auth_date
        hash:
          type: string
          description: WebApp.initDataUnsafe.hash
        query_id:
          type: string
          description: WebApp.initDataUnsafe.query_id
        chat_instance:
          type: string
        chat_type:
          type: string
        start_param:
          type: string
        can_send_after:
          type: number
        chat:
          type: object
        receiver:
          $ref: '#/components/schemas/UserInfo'
      required:
        - user
        - auth_date
        - hash
    CognitoResult:
      type: object
      properties:
        region:
          type: string
        identity_pool_id:
          type: string
        user_pool_id:
          type: string
        kms_key_id:
          type: string
        id_token:
          type: string
      required:
        - region
        - identity_pool_id
        - user_pool_id
        - kms_key_id
        - id_token
    LoginOutputDto:
      type: object
      properties:
        jwt:
          type: string
        key_encrypted:
          type: string
          description: The encrypted mnemonic phrase
        cognito_result:
          description: aws cognito config
          allOf:
            - $ref: '#/components/schemas/CognitoResult'
      required:
        - jwt
    "SwaggerBaseApiResponseFor class LoginOutputDto {\n} ":
      type: object
      properties:
        code:
          type: number
          description: |-
            200:success;
             4000:parameter exception,
             4001: auth hash error 
             4002: message not find.
             
        message:
          type: string
        data:
          $ref: '#/components/schemas/LoginOutputDto'
      required:
        - code
        - message
        - data
    SaveEncryptedKeyInputDto:
      type: object
      properties:
        key_encrypted:
          type: string
        address:
          type: string
      required:
        - key_encrypted
        - address
    'SwaggerBaseApiResponseFor undefined ':
      type: object
      properties:
        code:
          type: number
          description: |-
            200:success;
             4000:parameter exception,
             4001: auth hash error 
             4002: message not find.
             
        message:
          type: string
        data:
          type: object
      required:
        - code
        - message
        - data
    MiniAppActionInputDto:
      type: object
      properties:
        short_code:
          type: string
          description: short_code is a parameter in startapp
        chat_id:
          type: string
          description: chat_id is a parameter in startapp
        user_id:
          type: number
          description: Telegram.WebApp.initDataUnsafe
        source:
          type: number
          enum:
            - 0
            - 1
          description: 'mini app open source : 0 - bot, 1 - blink mini app'
          example: 0
        app_type:
          type: number
          enum:
            - 0
            - 1
          description: mini app open type:0- BlinkMiniApp, 1 - WalletMiniAPp
          example: 0
        action:
          type: number
          enum:
            - 0
            - 1
            - 2
          description: 'mini app open action: 0:Show home,1:Connect,2:SignTransaction,'
          example: 0
        publicKey:
          type: string
          description: tg user solana address
      required:
        - user_id
        - source
        - app_type
        - action
    ForwardingApiInputDto:
      type: object
      properties:
        method:
          type: number
          enum:
            - 0
            - 1
          description: 'API method: 0 - POST, 1 - GET'
          example: 0
        path:
          type: number
          enum: []
          description: url patch
          example: /auth/message
        body:
          type: number
          enum: []
          description: api request json string
      required:
        - method
        - path
        - body
    'SwaggerBaseApiResponseFor function String() { [native code] } ':
      type: object
      properties:
        code:
          type: number
          description: |-
            200:success;
             4000:parameter exception,
             4001: auth hash error 
             4002: message not find.
             
        message:
          type: string
        data:
          type: string
      required:
        - code
        - message
        - data
    AppQueryOutputDto:
      type: object
      properties:
        public_key:
          type: string
        data:
          type: string
        nonce:
          type: string
        method:
          type: string
        error_message:
          type: string
        error_code:
          type: string
        domain:
          type: string
    "SwaggerBaseApiResponseFor class AppQueryOutputDto {\n} ":
      type: object
      properties:
        code:
          type: number
          description: |-
            200:success;
             4000:parameter exception,
             4001: auth hash error 
             4002: message not find.
             
        message:
