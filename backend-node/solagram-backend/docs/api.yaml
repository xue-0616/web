        - totalPages
    AddressTransfersOutput:
      type: object
      properties:
        message:
          type: string
        status:
          type: string
        results:
          type: array
          items:
            $ref: '#/components/schemas/TransfersInfo'
        pagination:
          $ref: '#/components/schemas/Pagination'
      required:
        - message
        - status
        - results
        - pagination
    "SwaggerBaseApiResponseFor class AddressTransfersOutput {\n} ":
      type: object
      properties:
        code:
          type: number
          description: |-
            200:success;
             4000:parameter exception,
